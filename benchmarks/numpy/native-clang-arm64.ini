; Meson native file for LLVM/clang-cl ARM64 (NumPy build)
;
; Usage:
;   meson setup build-llvm --native-file native-clang-arm64.ini
;
; Note: clang-cl.exe, lld-link.exe must be on PATH.
;       Run from a vcvarsall arm64 environment (clang-cl needs Windows SDK).

[binaries]
c = 'clang-cl'
cpp = 'clang-cl'
c_ld = 'lld-link'
cpp_ld = 'lld-link'
ar = 'llvm-lib'

[built-in options]
c_args = ['-O3', '-flto', '/clang:-ffast-math', '/GS-']
cpp_args = ['-O3', '-flto', '/clang:-ffast-math', '/GS-']
c_link_args = ['-fuse-ld=lld']
cpp_link_args = ['-fuse-ld=lld']
buildtype = 'release'
b_ndebug = 'true'

[host_machine]
system = 'windows'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'
