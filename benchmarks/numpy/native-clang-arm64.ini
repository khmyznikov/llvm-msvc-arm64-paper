; Meson native file for LLVM/clang-cl ARM64 (NumPy build)
;
; Usage:
;   meson setup build-llvm --native-file native-clang-arm64.ini
;
; Note: clang-cl.exe, lld-link.exe must be on PATH.
;       Run from a vcvarsall arm64 environment (clang-cl needs Windows SDK).

[binaries]
c = 'clang-cl'
cpp = 'clang-cl'
c_ld = 'lld-link'
cpp_ld = 'lld-link'
ar = 'llvm-lib'

[built-in options]
c_args = ['/clang:-O3', '/clang:-flto', '/clang:-ffast-math', '-fuse-ld=lld', '/GS-', '/Zi', '/Zo', '/Oy-']
cpp_args = ['/clang:-O3', '/clang:-flto', '/clang:-ffast-math', '-fuse-ld=lld', '/GS-', '/Zi', '/Zo', '/Oy-']
c_link_args = ['/LTCG', '/OPT:REF', '/OPT:ICF', '/INCREMENTAL:NO', '/DEBUG', '/DEBUGTYPE:CV,FIXUP']
cpp_link_args = ['/LTCG', '/OPT:REF', '/OPT:ICF', '/INCREMENTAL:NO', '/DEBUG', '/DEBUGTYPE:CV,FIXUP']
buildtype = 'release'
b_ndebug = 'true'

[project options]
cpu-baseline = 'neon neon_fp16 neon_vfpv4 asimd'
cpu-dispatch = 'none'

[host_machine]
system = 'windows'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'
