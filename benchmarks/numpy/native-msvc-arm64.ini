; Meson native file for MSVC ARM64 (NumPy build)
;
; Usage:
;   meson setup build-msvc --native-file native-msvc-arm64.ini
;
; Note: cl.exe, link.exe, lib.exe must be on PATH.
;       Run from a vcvarsall arm64 environment.

[binaries]
c = 'cl'
cpp = 'cl'
c_ld = 'link'
cpp_ld = 'link'
ar = 'lib'

[built-in options]
c_args = ['/O2', '/GL', '/fp:fast', '/GS-']
cpp_args = ['/O2', '/GL', '/fp:fast', '/GS-']
c_link_args = ['/LTCG']
cpp_link_args = ['/LTCG']
buildtype = 'release'
b_ndebug = 'true'

[host_machine]
system = 'windows'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'
